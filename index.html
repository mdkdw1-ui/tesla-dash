<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Driving Control Dashboard (Kakao Map)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    #map { height: calc(100vh - 180px); min-height: 500px; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center m-0 p-0">

  <!-- 1. 보안 설정 및 로그인 레이어 -->
  <div id="authContainer" class="w-full max-w-md p-8 bg-gray-800 rounded-xl shadow-2xl border border-gray-700 mx-4">
    <div id="setupView" class="hidden">
      <h2 class="text-2xl font-bold text-yellow-500 mb-2 text-center">🗺️ 최초 앱 & 카카오맵 설정</h2>
      <p class="text-xs text-gray-400 mb-4 text-center">우리집 DB 정보와 카카오 API 키를 입력하세요.</p>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Firebase Web API Key</label>
          <input type="text" id="cfg-apiKey" placeholder="AIzaSy... 입력" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-sm focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Firebase Project ID</label>
          <input type="text" id="cfg-projectId" value="teslaapp-a6415" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-sm focus:outline-none font-mono">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Firebase App ID</label>
          <input type="text" id="cfg-appId" placeholder="1:xxxx:web:xxxx 입력" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-xs focus:outline-none font-mono">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Kakao JavaScript API Key</label>
          <input type="text" id="cfg-kakaoKey" placeholder="카카오 디벨로퍼스 발급 JS 키 입력" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-sm focus:outline-none font-mono">
        </div>
        <button onclick="saveAndEncryptConfig()" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded transition mt-4">설정 저장 및 로그인하기</button>
      </div>
    </div>

    <div id="loginView" class="hidden">
      <h2 class="text-2xl font-bold text-center mb-6">Tesla Dashboard 로그인</h2>
      <div class="space-y-4">
        <input type="password" id="loginPassword" onkeydown="if(event.key === 'Enter') handleLogin()" placeholder="비밀번호 입력" class="w-full bg-gray-700 border border-gray-600 rounded p-3 text-white font-mono text-center text-lg focus:outline-none">
        <div id="loginError" class="text-red-500 text-xs text-center hidden">❌ 비밀번호 오류 또는 복호화 실패</div>
        <button onclick="handleLogin()" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 px-4 rounded transition">접속하기</button>
      </div>
    </div>
  </div>

  <!-- 2. 메인 관제 시스템 레이어 -->
  <div id="appDashboard" class="hidden w-full min-h-screen flex flex-col md:flex-row bg-gray-900 text-gray-100">
    <div class="w-full md:w-72 bg-gray-800 p-5 flex flex-col justify-between border-r border-gray-700 space-y-6">
      <div class="space-y-5">
        <h1 class="text-xl font-bold text-yellow-500 flex items-center gap-2">⚡ Tesla 카카오 관제</h1>
        
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">🗺️ 지도 스타일 변경</label>
          <select id="mapStyleSelect" onchange="changeMapStyle()" class="w-full bg-gray-700 text-white rounded p-2 text-sm border border-gray-600 focus:outline-none">
            <option value="roadmap" selected>🗺️ 카카오 표준 지도</option>
            <option value="skyview">🛰️ 고해상도 스카이뷰</option>
            <option value="hybrid">🏙️ 하이브리드 중첩뷰</option>
          </select>
        </div>

        <hr class="border-gray-700">

        <!-- 📅 년/월 드랍다운 선택기 -->
        <div class="space-y-3">
          <label class="block text-xs font-semibold text-gray-400 uppercase">📅 조회 기간 설정</label>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <span class="text-[11px] text-gray-400 block mb-0.5">시작 년도</span>
              <select id="startYear" onchange="updateDashboardView()" class="w-full bg-gray-700 text-sm text-white rounded p-1.5 border border-gray-600 focus:outline-none"></select>
            </div>
            <div>
              <span class="text-[11px] text-gray-400 block mb-0.5">시작 월</span>
              <select id="startMonth" onchange="updateDashboardView()" class="w-full bg-gray-700 text-sm text-white rounded p-1.5 border border-gray-600 focus:outline-none"></select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <span class="text-[11px] text-gray-400 block mb-0.5">종료 년도</span>
              <select id="endYear" onchange="updateDashboardView()" class="w-full bg-gray-700 text-sm text-white rounded p-1.5 border border-gray-600 focus:outline-none"></select>
            </div>
            <div>
              <span class="text-[11px] text-gray-400 block mb-0.5">종료 월</span>
              <select id="endMonth" onchange="updateDashboardView()" class="w-full bg-gray-700 text-sm text-white rounded p-1.5 border border-gray-600 focus:outline-none"></select>
            </div>
          </div>
        </div>

        <div class="pt-2">
          <div id="syncStatus" class="text-xs text-yellow-400 bg-gray-900/50 p-2 rounded border border-gray-700 font-mono text-center">대기 중...</div>
        </div>
      </div>
      
      <button onclick="resetAppConfig()" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs py-2 rounded transition">🔑 인증 정보 초기화</button>
    </div>

    <!-- 메인 대화면 지도 관제 탭 -->
    <div class="flex-1 p-4 flex flex-col space-y-4">
      <div class="bg-gray-800 p-4 rounded-xl shadow-lg flex-1 flex flex-col justify-between">
        <div id="map" class="rounded-lg bg-gray-700 shadow-inner flex-1 mb-4"></div>
        
        <!-- HUD 통계 알림판 -->
        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="bg-gray-700/60 p-2.5 rounded-lg border border-gray-700"><span class="block text-[11px] text-gray-400">선택 기간 총 거리</span><span id="hud-distance" class="text-lg font-bold text-green-400">0.00 km</span></div>
          <div class="bg-gray-700/60 p-2.5 rounded-lg border border-gray-700"><span class="block text-[11px] text-gray-400">선택 기간 주행 횟수</span><span id="hud-count" class="text-lg font-bold text-blue-400">0회</span></div>
          <div class="bg-gray-700/60 p-2.5 rounded-lg border border-gray-700"><span class="block text-[11px] text-gray-400">배터리 총 사용량</span><span id="hud-battery" class="text-lg font-bold text-yellow-400">0%</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_CONFIG_KEY = "secure_tesla_dashboard_local_tokens";
    let db, allTrips = [], map, routePolylines = [], mapMarkers = [];

    window.onload = function() {
      initDateDropdowns();
      if (!localStorage.getItem(STORAGE_CONFIG_KEY)) {
        document.getElementById('setupView').classList.remove('hidden');
      } else {
        document.getElementById('loginView').classList.remove('hidden');
      }
    };

    function initDateDropdowns() {
      const currentYear = 2026;
      const sYear = document.getElementById('startYear'), eYear = document.getElementById('endYear');
      const sMonth = document.getElementById('startMonth'), eMonth = document.getElementById('endMonth');
      
      for(let y = currentYear; y >= 2024; y--) {
        sYear.add(new Option(`${y}년`, y)); eYear.add(new Option(`${y}년`, y));
      }
      for(let m = 1; m <= 12; m++) {
        sMonth.add(new Option(`${m}월`, m)); eMonth.add(new Option(`${m}월`, m));
      }
      sYear.value = currentYear; sMonth.value = 1;
      eYear.value = currentYear; eMonth.value = new Date().getMonth() + 1;
    }

    // 카카오 맵 스크립트를 동적으로 안전하게 주입하는 함수
    function loadKakaoScript(appKey, callback) {
      if (window.kakao && window.kakao.maps) { callback(); return; }
      const script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${appKey}&autoload=false`;
      script.charset = 'utf-8';
      script.onload = () => {
        kakao.maps.load(callback);
      };
      document.head.appendChild(script);
    }

    function saveAndEncryptConfig() {
      const config = {
        apiKey: document.getElementById('cfg-apiKey').value.trim(),
        projectId: document.getElementById('cfg-projectId').value.trim(),
        appId: document.getElementById('cfg-appId').value.trim(),
        kakaoKey: document.getElementById('cfg-kakaoKey').value.trim()
      };
      if (!config.apiKey || !config.projectId || !config.appId || !config.kakaoKey) return alert("❌ 모든 항목을 입력해 주세요.");
      localStorage.setItem(STORAGE_CONFIG_KEY, CryptoJS.AES.encrypt(JSON.stringify(config), "emillie00").toString());
      initializeApp(config);
    }

    function handleLogin() {
      try {
        const bytes = CryptoJS.AES.decrypt(localStorage.getItem(STORAGE_CONFIG_KEY), document.getElementById('loginPassword').value.trim());
        const config = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
        document.getElementById('loginError').classList.add('hidden');
        initializeApp(config);
      } catch (e) {
        document.getElementById('loginError').classList.remove('hidden');
      }
    }

    async function initializeApp(config) {
      document.body.classList.remove('items-center', 'justify-center');
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('appDashboard').classList.remove('hidden');
      
      if (!firebase.apps.length) firebase.initializeApp({
        apiKey: config.apiKey,
        projectId: config.projectId,
        appId: config.appId
      });
      db = firebase.firestore();
      
      // 카카오 스크립트 로드 완료 후 맵 로직 가동
      loadKakaoScript(config.kakaoKey, async () => {
        initMap();
        await loadViewerData();
      });
    }

    async function loadViewerData() {
      const statusEl = document.getElementById('syncStatus');
      statusEl.innerText = "📥 우리집 DB 데이터 읽는 중...";
      allTrips = [];

      const collections = ['driving', 'vehicle'];
      for (const colName of collections) {
        const snap = await db.collection(colName).get();
        snap.docs.forEach(doc => {
          const data = doc.data();
          const timestamp = data.date || parseInt(doc.id);
          const waypoints = [];

          function deepScan(obj) {
            if (!obj || typeof obj !== 'object') return;
            if (Array.isArray(obj)) { obj.forEach(item => deepScan(item)); return; }
            let lat = null, lng = null, odometer = null;
            Object.keys(obj).forEach(k => {
              const kl = k.toLowerCase();
              if (kl === 'lat' || kl === 'latitude') lat = Number(obj[k]);
              if (kl === 'lng' || kl === 'longitude' || kl === 'lon') lng = Number(obj[k]);
              if (kl.includes('odometer') || kl === 'odo') odometer = Number(obj[k]);
            });
            if (lat && lng && !isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
              waypoints.push({ lat, lng, odometer });
            }
            Object.keys(obj).forEach(k => { if (typeof obj[k] === 'object' && obj[k] !== null) deepScan(obj[k]); });
          }

          deepScan(data);
          waypoints.sort((a, b) => (a.odometer || 0) - (b.odometer || 0));

          if (waypoints.length > 0) {
            allTrips.push({
              id: `${colName}_${doc.id}`,
              timestamp,
              moveKM: Number(data.moveKM || data.distance || 0),
              useBattery: Number(data.useBattery || 0),
              waypoints
            });
          }
        });
      }

      allTrips.sort((a, b) => b.timestamp - a.timestamp);
      statusEl.innerText = `✅ 로드 완료 (총 ${allTrips.length}개 주행기록)`;
      updateDashboardView();
    }

    function updateDashboardView() {
      if (allTrips.length === 0 || !map) return;

      const sYear = parseInt(document.getElementById('startYear').value);
      const sMonth = parseInt(document.getElementById('startMonth').value);
      const eYear = parseInt(document.getElementById('endYear').value);
      const eMonth = parseInt(document.getElementById('endMonth').value);

      const startDate = new Date(sYear, sMonth - 1, 1, 0, 0, 0).getTime();
      const endDate = new Date(eYear, eMonth, 1, 23, 59, 59).getTime();

      const targetTrips = allTrips.filter(t => t.timestamp >= startDate && t.timestamp <= endDate);

      // 기존 카카오 요소 지도에서 제거
      routePolylines.forEach(p => p.setMap(null)); routePolylines = [];
      mapMarkers.forEach(m => m.setMap(null)); mapMarkers = [];

      let totalKM = 0, totalBatUsed = 0;
      const bounds = new kakao.maps.LatLngBounds();
      let hasPoints = false;

      targetTrips.forEach(trip => {
        totalKM += trip.moveKM;
        totalBatUsed += trip.useBattery;

        // 카카오 LatLng 배열 생성
        const linePath = trip.waypoints.map(wp => new kakao.maps.LatLng(wp.lat, wp.lng));
        const timeLabel = new Date(trip.timestamp).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        if (linePath.length > 0) {
          const polyline = new kakao.maps.Polyline({
            path: linePath,
            strokeWidth: 5,
            strokeColor: '#ef4444',
            strokeOpacity: 0.8,
            strokeStyle: 'solid'
          });
          
          polyline.setMap(map);
          routePolylines.push(polyline);
          
          linePath.forEach(coord => {
            bounds.extend(coord);
            hasPoints = true;
          });

          // 🖱️ 주행 경로 클릭 시 커스텀 정보창 출력 연동
          kakao.maps.event.addListener(polyline, 'click', function(mouseEvent) {
            const infowindow = new kakao.maps.InfoWindow({
              content: `
                <div style="padding:10px;color:#111827;font-size:12px;font-family:sans-serif;line-height:1.5;min-width:180px;">
                  <b>📅 주행 일시:</b> ${timeLabel}<br>
                  <b>🏁 주행 거리:</b> ${trip.moveKM.toFixed(2)} km<br>
                  <b>🔋 배터리 소모:</b> ${trip.useBattery}%
                </div>
              `,
              removable: true
            });
            infowindow.setPosition(mouseEvent.latLng);
            infowindow.open(map);
          });

          // 출발지 마커 표기
          const marker = new kakao.maps.Marker({
            position: linePath[0]
          });
          marker.setMap(map);
          mapMarkers.push(marker);
        }
      });

      if (hasPoints) {
        map.setBounds(bounds);
      }

      document.getElementById('hud-distance').innerText = `${totalKM.toFixed(2)} km`;
      document.getElementById('hud-count').innerText = `${targetTrips.length}회 주행`;
      document.getElementById('hud-battery').innerText = `${totalBatUsed.toFixed(0)}%`;
    }

    function initMap() {
      if (map) return;
      const container = document.getElementById('map');
      const options = {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 5
      };
      map = new kakao.maps.Map(container, options);
      changeMapStyle();
    }

    function changeMapStyle() {
      const style = document.getElementById('mapStyleSelect').value;
      if (!map) return;

      if (style === 'skyview') {
        map.setMapTypeId(kakao.maps.MapTypeId.SKYVIEW);
      } else if (style === 'hybrid') {
        map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
      } else {
        map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
      }
    }

    function resetAppConfig() {
      if (confirm("🚨 저장된 개인 DB 설정을 초기화하시겠습니까?")) {
        localStorage.removeItem(STORAGE_CONFIG_KEY);
        location.reload();
      }
    }
  </script>
</body>
</html>
