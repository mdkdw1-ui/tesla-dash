<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Telemetry Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    body { background-color: #0d0e12; color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .card-dark { background-color: #161820; border: 1px solid #262936; }
    .card-border-amber { border: 1px solid #d97706; }
  </style>
</head>
<body class="min-h-screen flex flex-col pb-10">

  <!-- Header -->
  <header class="bg-[#12141c] border-b border-gray-800 px-6 py-4 flex justify-between items-center shadow-md">
    <div class="flex items-center space-x-3">
      <span class="text-2xl">⚡</span>
      <h1 class="text-lg font-bold tracking-tight text-white">Tesla Telemetry Dashboard</h1>
    </div>
    
    <div class="flex items-center space-x-3">
      <nav class="flex space-x-2">
        <button onclick="switchTab('driving')" id="btn-tab-driving" class="px-4 py-2 text-xs font-semibold rounded-lg bg-blue-600 text-white transition">주행 지도</button>
        <button onclick="switchTab('vehicle')" id="btn-tab-vehicle" class="px-4 py-2 text-xs font-semibold rounded-lg bg-gray-800 text-gray-400 hover:text-white transition">내 차량 정보</button>
      </nav>
      <button onclick="openConfigModal()" class="px-3 py-2 text-xs font-medium rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">⚙️</button>
    </div>
  </header>

  <main class="flex-1 p-4 md:p-6 max-w-2xl mx-auto w-full flex flex-col gap-5">

    <!-- 1. 주행 지도 탭 -->
    <div id="panel-driving" class="flex-1 flex flex-col gap-4">
      <div class="card-dark rounded-xl p-4 flex flex-col gap-3">
        <div class="flex justify-between items-center">
          <span class="text-xs font-bold text-gray-400">🗺️ 주행 기록 조회</span>
          <select id="filterMode" onchange="onFilterModeChange()" class="bg-gray-800 border border-gray-700 rounded-lg p-2 text-xs text-white">
            <option value="single" selected>1회 주행 (일회운행)</option>
            <option value="daily">일간</option>
            <option value="weekly">주간</option>
            <option value="monthly">월간</option>
            <option value="yearly">연간</option>
          </select>
        </div>
        <div id="dynamicFilterControls"></div>
        <div class="flex justify-around bg-[#0d0e12] p-3 rounded-lg text-xs border border-gray-800">
          <div>건수: <span id="stat-count" class="font-bold text-blue-400">-</span></div>
          <div>총 거리: <span id="stat-distance" class="font-bold text-green-400">-</span></div>
          <div>배터리: <span id="stat-energy" class="font-bold text-yellow-400">-</span></div>
        </div>
      </div>
      <div class="card-dark rounded-xl overflow-hidden min-h-[400px] relative">
        <div id="map" class="w-full h-full min-h-[400px]"></div>
      </div>
    </div>

    <!-- 2. 내 차량 정보 탭 (사진 스타일 적용) -->
    <div id="panel-vehicle" class="hidden space-y-4">
      
      <!-- 상단 타이틀 & 동기화 시간 -->
      <div class="flex justify-between items-center px-1">
        <h2 class="text-xl font-extrabold text-white">최근 차량 상태</h2>
        <span id="v-last-time" class="text-xs text-gray-400">--:-- 기준 🔄</span>
      </div>

      <!-- 최상단 차량 요약 카드 (온/오프라인, 배터리, 오도메터) -->
      <div class="card-dark p-4 rounded-2xl flex justify-between items-center border border-gray-800 shadow-lg">
        <div class="flex items-center space-x-2">
          <span id="v-status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></span>
          <span id="v-status-text" class="text-sm font-semibold text-gray-200">현재: 오프라인</span>
        </div>
        <div class="flex items-center space-x-4 text-sm font-bold">
          <div class="flex items-center space-x-1">
            <span>🔋</span>
            <span id="v-battery-val" class="text-gray-100">-%</span>
          </div>
          <div class="flex items-center space-x-1">
            <span>📍</span>
            <span id="v-odometer-val" class="text-gray-100">- km</span>
          </div>
        </div>
      </div>

      <!-- 최근 전비 카드 -->
      <div class="card-dark p-5 rounded-2xl space-y-3">
        <div class="flex justify-between items-center">
          <span class="text-xs font-bold text-indigo-400 flex items-center gap-1">⚡ 최근 전비</span>
          <span id="v-trip-count" class="text-[11px] text-gray-400 bg-gray-800 px-2 py-0.5 rounded-full">주행 -건</span>
        </div>
        <div class="flex items-baseline space-x-2">
          <span id="v-efficiency" class="text-3xl font-black text-indigo-400">-</span>
          <span class="text-xs font-bold text-gray-400">km/kWh</span>
        </div>
        <hr class="border-gray-800/80 my-2">
        <div class="grid grid-cols-4 gap-2 text-center text-xs">
          <div>
            <span class="text-gray-500 block text-[10px] mb-0.5">주행거리</span>
            <span id="v-trip-dist" class="font-bold text-gray-200">- km</span>
          </div>
          <div>
            <span class="text-gray-500 block text-[10px] mb-0.5">사용 배터리</span>
            <span id="v-trip-bat" class="font-bold text-gray-200">-%</span>
          </div>
          <div>
            <span class="text-gray-500 block text-[10px] mb-0.5">배터리당</span>
            <span id="v-trip-per-bat" class="font-bold text-gray-200">- km/%</span>
          </div>
          <div>
            <span class="text-gray-500 block text-[10px] mb-0.5">사용 에너지</span>
            <span id="v-trip-kwh" class="font-bold text-gray-200">- kWh</span>
          </div>
        </div>
      </div>

      <!-- 상태 지속/주차 카드 -->
      <div id="card-state-duration" class="card-dark card-border-amber p-4 rounded-2xl flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <span id="v-state-icon" class="text-2xl">🅿️</span>
          <div>
            <div id="v-state-duration-title" class="text-sm font-bold text-amber-500">주차 중</div>
            <div id="v-state-start-time" class="text-[11px] text-gray-400">시각 정보 없음</div>
          </div>
        </div>
      </div>

      <!-- 타이어 공기압 카드 -->
      <div class="card-dark p-5 rounded-2xl space-y-3">
        <div class="flex justify-between items-center text-xs">
          <span class="font-bold text-gray-300 flex items-center gap-1">🛞 타이어 공기압</span>
          <div class="flex items-center space-x-2 text-[10px]">
            <span id="v-tpms-time" class="text-gray-400">-</span>
            <span id="v-outside-temp" class="text-gray-300 font-semibold">🌡️ -°C</span>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 pt-1">
          <div class="bg-[#0f1015] border border-amber-600/60 p-3 rounded-xl text-center">
            <span class="text-[10px] text-gray-400 block mb-1">앞 왼쪽</span>
            <span id="tpms-fl" class="text-lg font-extrabold text-amber-500">- psi</span>
          </div>
          <div class="bg-[#0f1015] border border-amber-600/60 p-3 rounded-xl text-center">
            <span class="text-[10px] text-gray-400 block mb-1">앞 오른쪽</span>
            <span id="tpms-fr" class="text-lg font-extrabold text-amber-500">- psi</span>
          </div>
          <div class="bg-[#0f1015] border border-amber-600/60 p-3 rounded-xl text-center">
            <span class="text-[10px] text-gray-400 block mb-1">뒤 왼쪽</span>
            <span id="tpms-rl" class="text-lg font-extrabold text-amber-500">- psi</span>
          </div>
          <div class="bg-[#0f1015] border border-amber-600/60 p-3 rounded-xl text-center">
            <span class="text-[10px] text-gray-400 block mb-1">뒤 오른쪽</span>
            <span id="tpms-rr" class="text-lg font-extrabold text-amber-500">- psi</span>
          </div>
        </div>

        <div class="flex justify-center items-center space-x-3 text-[10px] text-gray-400 pt-1">
          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>정상</span>
          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>주의</span>
          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>위험</span>
        </div>
      </div>

      <!-- 상태 변동 로그 타임라인 (온라인 / 오프라인 / 주행 / 충전) -->
      <div class="space-y-2 pt-2">
        <h3 class="text-xs font-bold text-gray-400 px-1">최근 상태 히스토리</h3>
        <div id="timeline-container" class="space-y-2">
          <!-- JS 타임라인 항목 생성 -->
        </div>
      </div>

    </div>

  </main>

  <!-- Config Modal -->
  <div id="modal-config" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-md w-full p-6 space-y-4">
      <h3 class="text-base font-bold text-white">🔑 설정</h3>
      <form onsubmit="saveConfig(event)" class="space-y-3 text-xs">
        <div>
          <label class="block text-gray-400 mb-1">카카오맵 API Key</label>
          <input type="text" id="input-kakao-key" required value="159c5d7588efc5939d431f005912f9f3" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white font-mono">
        </div>
        <div>
          <label class="block text-gray-400 mb-1">Supabase URL</label>
          <input type="url" id="input-supabase-url" required class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white font-mono">
        </div>
        <div>
          <label class="block text-gray-400 mb-1">Supabase Key</label>
          <input type="password" id="input-supabase-key" required class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white font-mono">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded transition">저장 및 시작</button>
      </form>
    </div>
  </div>

  <script>
    const SECRET_SALT = "Tesla_Supabase_Dashboard_2026";
    let configObj = { kakaoKey: '159c5d7588efc5939d431f005912f9f3', url: '', key: '' };
    let map = null;
    let allTrips = [];
    let currentPolylines = [];

    window.addEventListener('DOMContentLoaded', () => {
      if (!loadConfig()) openConfigModal();
      else initDashboard();
    });

    function loadConfig() {
      const enc = localStorage.getItem('tesla_dashboard_config');
      if (!enc) return false;
      try {
        const dec = CryptoJS.AES.decrypt(enc, SECRET_SALT).toString(CryptoJS.enc.Utf8);
        configObj = JSON.parse(dec);
        return !!(configObj.url && configObj.key);
      } catch (e) { return false; }
    }

    function saveConfig(e) {
      e.preventDefault();
      configObj = {
        kakaoKey: document.getElementById('input-kakao-key').value.trim(),
        url: document.getElementById('input-supabase-url').value.trim().replace(/\/$/, ""),
        key: document.getElementById('input-supabase-key').value.trim()
      };
      localStorage.setItem('tesla_dashboard_config', CryptoJS.AES.encrypt(JSON.stringify(configObj), SECRET_SALT).toString());
      location.reload();
    }

    function openConfigModal() {
      if (configObj.kakaoKey) document.getElementById('input-kakao-key').value = configObj.kakaoKey;
      if (configObj.url) document.getElementById('input-supabase-url').value = configObj.url;
      if (configObj.key) document.getElementById('input-supabase-key').value = configObj.key;
      document.getElementById('modal-config').classList.remove('hidden');
    }

    function initDashboard() {
      loadKakaoSdk(configObj.kakaoKey, () => {
        initMap();
        loadDrivingData();
        loadVehicleData();
      });
    }

    function loadKakaoSdk(appKey, callback) {
      if (window.kakao && window.kakao.maps) { kakao.maps.load(callback); return; }
      const script = document.createElement('script');
      script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${appKey}&autoload=false`;
      script.onload = () => kakao.maps.load(callback);
      document.head.appendChild(script);
    }

    function switchTab(tabName) {
      document.getElementById('panel-driving').classList.toggle('hidden', tabName !== 'driving');
      document.getElementById('panel-vehicle').classList.toggle('hidden', tabName !== 'vehicle');
      document.getElementById('btn-tab-driving').className = tabName === 'driving' ? "px-4 py-2 text-xs font-semibold rounded-lg bg-blue-600 text-white" : "px-4 py-2 text-xs font-semibold rounded-lg bg-gray-800 text-gray-400";
      document.getElementById('btn-tab-vehicle').className = tabName === 'vehicle' ? "px-4 py-2 text-xs font-semibold rounded-lg bg-blue-600 text-white" : "px-4 py-2 text-xs font-semibold rounded-lg bg-gray-800 text-gray-400";
      if (tabName === 'driving' && map) setTimeout(() => map.relayout(), 100);
      if (tabName === 'vehicle') loadVehicleData();
    }

    function initMap() {
      map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 5 });
    }

    async function fetchSupabaseTable(queryPath) {
      try {
        const res = await fetch(`${configObj.url}/rest/v1/${queryPath}`, {
          headers: { 'apikey': configObj.key, 'Authorization': `Bearer ${configObj.key}`, 'Range': '0-4999' }
        });
        return await res.json();
      } catch (err) { return []; }
    }

    async function loadDrivingData() {
      const rows = await fetchSupabaseTable('driving?order=created_at.desc');
      allTrips = rows.map(r => ({
        id: r.id, timestamp: new Date(r.created_at).getTime(), moveKM: Number(r.move_km || 0), useBattery: Number(r.use_battery || 0), path: r.location_list || []
      }));
      onFilterModeChange();
    }

    function onFilterModeChange() {
      const mode = document.getElementById('filterMode').value;
      const container = document.getElementById('dynamicFilterControls');
      if (allTrips.length === 0) { container.innerHTML = `<span class="text-xs text-gray-500">데이터가 없습니다.</span>`; return; }
      
      const options = allTrips.map(t => `<option value="${t.id}">${new Date(t.timestamp).toLocaleString('ko-KR')} (${t.moveKM.toFixed(1)}km)</option>`).join('');
      container.innerHTML = `<select id="ctrl-select" onchange="renderDrivingData()" class="w-full bg-gray-800 text-white rounded p-2 text-xs border border-gray-700">${options}</select>`;
      renderDrivingData();
    }

    function renderDrivingData() {
      const selectedId = document.getElementById('ctrl-select')?.value;
      const matched = allTrips.filter(t => t.id === selectedId);
      document.getElementById('stat-count').innerText = `${matched.length}건`;
      document.getElementById('stat-distance').innerText = `${matched.reduce((a,c)=>a+c.moveKM,0).toFixed(1)} km`;
      document.getElementById('stat-energy').innerText = `${matched.reduce((a,c)=>a+c.useBattery,0).toFixed(1)} %`;
    }

    // --- 내 차량 정보 렌더링 (사진 인과관계 디자인 구현) ---
    async function loadVehicleData() {
      const rows = await fetchSupabaseTable('vehicle?order=updated_at.desc&limit=15');
      if (!rows || rows.length === 0) return;

      const latest = rows[0];
      const raw = latest.raw_data || {};
      const stateLogs = Array.isArray(raw.stateLogs) ? raw.stateLogs : [];
      const currentLog = stateLogs.length > 0 ? stateLogs[stateLogs.length - 1] : raw;

      // 1. 상단 요약 정보
      const stateStr = (currentLog.state || latest.state || 'offline').toLowerCase();
      const batVal = currentLog.battery_level ?? latest.battery_level ?? 0;
      const odoVal = Math.round(currentLog.odometer ?? latest.odometer ?? 0);
      const updateDate = new Date(latest.updated_at || Date.now());

      document.getElementById('v-last-time').innerText = `${String(updateDate.getHours()).padStart(2,'0')}:${String(updateDate.getMinutes()).padStart(2,'0')} 기준 🔄`;
      document.getElementById('v-battery-val').innerText = `${batVal}%`;
      document.getElementById('v-odometer-val').innerText = `${odoVal.toLocaleString()} km`;

      // 온라인/오프라인 배지
      const statusDot = document.getElementById('v-status-dot');
      const statusText = document.getElementById('v-status-text');
      if (stateStr === 'online') {
        statusDot.className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
        statusText.innerText = "현재: 온라인";
      } else if (stateStr === 'driving') {
        statusDot.className = "w-2.5 h-2.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]";
        statusText.innerText = "현재: 주행 중";
      } else if (stateStr === 'charging') {
        statusDot.className = "w-2.5 h-2.5 rounded-full bg-purple-500 shadow-[0_0_8px_#a855f7]";
        statusText.innerText = "현재: 충전 중";
      } else {
        statusDot.className = "w-2.5 h-2.5 rounded-full bg-gray-500";
        statusText.innerText = "현재: 오프라인";
      }

      // 2. 전비 및 주행 계산
      if (allTrips.length > 0) {
        const totalDist = allTrips.reduce((a,c)=>a+c.moveKM,0);
        const totalBat = allTrips.reduce((a,c)=>a+c.useBattery,0);
        const estKwh = (totalBat / 100) * 60; // 60kWh 기준 추정
        const eff = estKwh > 0 ? (totalDist / estKwh).toFixed(2) : "0.00";

        document.getElementById('v-trip-count').innerText = `주행 ${allTrips.length}건`;
        document.getElementById('v-efficiency').innerText = eff;
        document.getElementById('v-trip-dist').innerText = `${totalDist.toFixed(1)} km`;
        document.getElementById('v-trip-bat').innerText = `${totalBat.toFixed(1)}%`;
        document.getElementById('v-trip-per-bat').innerText = totalBat > 0 ? `${(totalDist / totalBat).toFixed(2)} km/%` : "-";
        document.getElementById('v-trip-kwh').innerText = `${estKwh.toFixed(1)} kWh`;
      }

      // 3. 상태 지속 시간 카드
      if (currentLog.startDateTime) {
        const diffMs = Date.now() - currentLog.startDateTime;
        const hours = Math.floor(diffMs / 3600000);
        const mins = Math.floor((diffMs % 3600000) / 60000);
        const startTimeStr = new Date(currentLog.startDateTime).toLocaleString('ko-KR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        document.getElementById('v-state-duration-title').innerText = `${stateStr === 'online' ? '온라인' : '주차'} ${hours > 0 ? hours + '시간 ' : ''}${mins}분`;
        document.getElementById('v-state-start-time').innerText = `${startTimeStr} 부터`;
      }

      // 4. TPMS 공기압 및 온도
      const tpms = currentLog.tpms || {};
      const outsideTemp = currentLog.outside_temp || currentLog.out_temp || '-';
      document.getElementById('v-outside-temp').innerText = `🌡️ ${outsideTemp}°C`;

      const fl = latest.tpms_fl || Math.round((tpms.fl || 0) * 14.5038) || 34;
      const fr = latest.tpms_fr || Math.round((tpms.fr || 0) * 14.5038) || 34;
      const rl = latest.tpms_rl || Math.round((tpms.rl || 0) * 14.5038) || 34;
      const rr = latest.tpms_rr || Math.round((tpms.rr || 0) * 14.5038) || 34;

      document.getElementById('tpms-fl').innerText = `${fl} psi`;
      document.getElementById('tpms-fr').innerText = `${fr} psi`;
      document.getElementById('tpms-rl').innerText = `${rl} psi`;
      document.getElementById('tpms-rr').innerText = `${rr} psi`;

      // 5. 타임라인 목록 생성
      const timelineBox = document.getElementById('timeline-container');
      timelineBox.innerHTML = '';

      rows.forEach(r => {
        const rRaw = r.raw_data || {};
        const logs = Array.isArray(rRaw.stateLogs) ? rRaw.stateLogs : [r];

        logs.reverse().forEach(log => {
          const st = (log.state || 'offline').toLowerCase();
          let badgeColor = "bg-purple-600 text-white";
          let label = "온라인";

          if (st === 'driving' || st === '주행') { badgeColor = "bg-blue-600 text-white"; label = "주행"; }
          else if (st === 'charging' || st === '충전') { badgeColor = "bg-green-600 text-white"; label = "충전"; }
          else if (st === 'offline' || st === '오프라인') { badgeColor = "bg-purple-900/60 text-purple-300 border border-purple-700"; label = "오프라인"; }

          const startT = log.startDateTime ? new Date(log.startDateTime) : new Date(r.updated_at);
          const endT = log.endDateTime ? new Date(log.endDateTime) : null;

          const timeRange = endT 
            ? `${String(startT.getHours()).padStart(2,'0')}:${String(startT.getMinutes()).padStart(2,'0')} ~ ${String(endT.getHours()).padStart(2,'0')}:${String(endT.getMinutes()).padStart(2,'0')} (${Math.round((endT - startT)/60000)}분)`
            : `${String(startT.getHours()).padStart(2,'0')}:${String(startT.getMinutes()).padStart(2,'0')}`;

          const itemHtml = `
            <div class="card-dark p-3 rounded-xl flex justify-between items-center text-xs">
              <div class="flex items-center space-x-3">
                <span class="px-2.5 py-1 rounded-full text-[10px] font-bold ${badgeColor}">${label}</span>
                <span class="text-gray-300 font-medium">${timeRange}</span>
              </div>
              <div class="flex items-center space-x-3 font-semibold text-gray-200">
                <span>🔋 ${log.battery_level || r.battery_level || 0}%</span>
                <span>📍 ${Math.round(log.odometer || r.odometer || 0)} km</span>
              </div>
            </div>
          `;
          timelineBox.insertAdjacentHTML('beforeend', itemHtml);
        });
      });
    }
  </script>
</body>
</html>
