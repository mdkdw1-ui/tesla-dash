<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Driving Control Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Leaflet.js CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- CryptoJS CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <!-- Firebase SDK Compat v10 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    #map { height: 480px; z-index: 1; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center m-0 p-0">

  <!-- 1. 보안 인증 레이어 -->
  <div id="authContainer" class="w-full max-w-md p-8 bg-gray-800 rounded-xl shadow-2xl border border-gray-700 mx-4">
    <div id="setupView" class="hidden">
      <h2 class="text-2xl font-bold text-red-500 mb-2 text-center">⚡ 최초 앱 보안 설정</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">1. API Key</label>
          <input type="text" id="cfg-apiKey" placeholder="AIzaSy... 키 입력" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-sm focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">2. Project ID</label>
          <input type="text" id="cfg-projectId" value="teslaapp-a6415" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-sm focus:outline-none font-mono">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">3. App ID</label>
          <input type="text" id="cfg-appId" value="1:246766153687:web:127a19264e2d94aca72592" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-xs focus:outline-none font-mono">
        </div>
        <button onclick="saveAndEncryptConfig()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition mt-4">보안 저장 및 로그인</button>
      </div>
    </div>

    <div id="loginView" class="hidden">
      <h2 class="text-2xl font-bold text-center mb-6">Tesla Dashboard 로그인</h2>
      <div class="space-y-4">
        <input type="password" id="loginPassword" placeholder="비밀번호 입력" class="w-full bg-gray-700 border border-gray-600 rounded p-3 text-white font-mono text-center text-lg focus:outline-none">
        <div id="loginError" class="text-red-500 text-xs text-center hidden">❌ 비밀번호 오류 또는 복호화 실패</div>
        <button onclick="handleLogin()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded transition">접속하기</button>
      </div>
    </div>
  </div>

  <!-- 2. 메인 관제 시스템 레이어 -->
  <div id="appDashboard" class="hidden w-full min-h-screen flex flex-col md:flex-row bg-gray-900 text-gray-100">
    <!-- 사이드바 -->
    <div class="w-full md:w-64 bg-gray-800 p-6 flex flex-col justify-between border-r border-gray-700">
      <div>
        <h1 class="text-xl font-bold text-red-500 mb-6 flex items-center gap-2">⚡ Tesla 관제 시스템</h1>
        <label class="block text-sm font-medium text-gray-400 mb-2">주행 기록 선택</label>
        <select id="tripSelect" class="w-full bg-gray-700 text-white rounded p-2 border border-gray-600 focus:outline-none focus:border-red-500"></select>
      </div>
      <button onclick="resetAppConfig()" class="mt-6 w-full bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs py-2 rounded transition">🔑 인증 정보 초기화</button>
    </div>

    <!-- 메인 뷰 -->
    <div class="flex-1 p-6 md:p-10 overflow-y-auto">
      <div class="flex border-b border-gray-700 mb-6">
        <button onclick="switchTab('mapTab')" id="btn-mapTab" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-red-500 text-red-500">🗺️ 주행 경로 지도</button>
        <button onclick="switchTab('chartTab')" id="btn-chartTab" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-white">🔋 전비 및 배터리</button>
        <button onclick="switchTab('tempTab')" id="btn-tempTab" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-white">🌡️ 온도 상관관계</button>
        <button onclick="switchTab('logTab')" id="btn-logTab" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-white">📑 경로 상세 로그</button>
      </div>

      <!-- 지도 탭 -->
      <div id="mapTab" class="tab-content block">
        <div class="bg-gray-800 p-4 rounded-lg shadow-lg">
          <div id="map" class="rounded bg-gray-700 mb-4"></div>
          
          <!-- 실시간 실태 진단 구역 (오류 추적용) -->
          <div id="debug-zone" class="mb-4 p-4 bg-yellow-950/40 border border-yellow-800/60 rounded text-xs text-yellow-300 hidden"></div>

          <div class="grid grid-cols-3 gap-4 text-center">
            <div class="bg-gray-700 p-3 rounded"><span class="block text-xs text-gray-400">총 주행 거리</span><span id="hud-distance" class="text-xl font-bold text-green-400">0.00 km</span></div>
            <div class="bg-gray-700 p-3 rounded"><span class="block text-xs text-gray-400">배터리 변동</span><span id="hud-battery" class="text-xl font-bold text-blue-400">0% → 0%</span></div>
            <div class="bg-gray-700 p-3 rounded"><span class="block text-xs text-gray-400">배터리 소모 (환산전비)</span><span id="hud-eff" class="text-sm font-bold text-yellow-400">0% (0 Wh/km)</span></div>
          </div>
        </div>
      </div>

      <div id="chartTab" class="tab-content hidden"><div class="bg-gray-800 p-6 rounded-lg h-[400px]"><canvas id="efficiencyChart"></canvas></div></div>
      <div id="tempTab" class="tab-content hidden"><div class="bg-gray-800 p-6 rounded-lg h-[400px]"><canvas id="tempScatterChart"></canvas></div></div>

      <!-- 상세 로그 테이블 탭 -->
      <div id="logTab" class="tab-content hidden">
        <div class="bg-gray-800 p-6 rounded-lg shadow-lg overflow-x-auto">
          <table class="w-full text-left text-sm text-gray-300">
            <thead class="bg-gray-700 text-gray-400 uppercase text-xs">
              <tr><th class="p-3">구간 번호</th><th class="p-3">누적 거리(ODO)</th><th class="p-3">외기/내기 온도</th><th class="p-3">현재 배터리</th></tr>
            </thead>
            <tbody id="logTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "secure_tesla_dashboard_tokens";
    let db, trips = {}, map, routeLine, startMarker, endMarker, effChart, tempChart;

    window.onload = function() {
      if (!localStorage.getItem(STORAGE_KEY)) {
        document.getElementById('setupView').classList.remove('hidden');
      } else {
        document.getElementById('loginView').classList.remove('hidden');
      }
    };

    function saveAndEncryptConfig() {
      const config = {
        apiKey: document.getElementById('cfg-apiKey').value.trim(),
        projectId: document.getElementById('cfg-projectId').value.trim(),
        appId: document.getElementById('cfg-appId').value.trim()
      };
      if (!config.apiKey || !config.projectId || !config.appId) return alert("❌ 키를 모두 입력해 주세요.");
      localStorage.setItem(STORAGE_KEY, CryptoJS.AES.encrypt(JSON.stringify(config), "emillie00").toString());
      initializeAppDashboard(config);
    }

    function handleLogin() {
      try {
        const bytes = CryptoJS.AES.decrypt(localStorage.getItem(STORAGE_KEY), document.getElementById('loginPassword').value.trim());
        const config = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
        document.getElementById('loginError').classList.add('hidden');
        initializeAppDashboard(config);
      } catch (e) {
        document.getElementById('loginError').classList.remove('hidden');
      }
    }

    function initializeAppDashboard(config) {
      document.body.classList.remove('items-center', 'justify-center');
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('appDashboard').classList.remove('hidden');
      if (!firebase.apps.length) firebase.initializeApp(config);
      db = firebase.firestore();
      initMap();
      loadData();
    }

    function resetAppConfig() {
      if (confirm("🚨 인증 정보를 초기화하시겠습니까?")) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }

    function initMap() {
      if (map) return;
      map = L.map('map').setView([37.5665, 126.9780], 11);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);
    }

    async function loadData() {
      try {
        const snapshot = await db.collection('driving').orderBy('date', 'desc').get();
        if (snapshot.empty) {
          document.getElementById('tripSelect').innerHTML = '<option>데이터가 존재하지 않습니다.</option>';
          return;
        }
        trips = {};
        snapshot.docs.forEach(doc => {
          const data = doc.data();
          const timestamp = data.date || parseInt(doc.id);
          let tripName = doc.id + " 주행";
          if (!isNaN(timestamp)) {
            tripName = new Date(timestamp).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' 주행';
          }
          trips[tripName] = data;
        });

        const select = document.getElementById('tripSelect');
        select.innerHTML = '';
        Object.keys(trips).forEach((tripName, idx) => {
          const opt = document.createElement('option');
          opt.value = tripName; opt.innerText = tripName;
          if(idx === 0) opt.selected = true;
          select.appendChild(opt);
        });
        select.addEventListener('change', (e) => updateDashboard(e.target.value));
        
        updateDashboard(select.value);
        renderGlobalCharts();
      } catch (error) {
        console.error(error);
      }
    }

    // 🎯 초강력 무제한 깊이 탐색(Deep Recursive Scanner) 엔진
    function updateDashboard(tripId) {
      const tripData = trips[tripId];
      if (!tripData) return;

      if (map) setTimeout(() => map.invalidateSize(), 50);

      const waypoints = [];
      
      // 오브젝트 트리를 밑바닥까지 뒤져서 좌표쌍을 수집하는 재귀함수
      function deepScan(obj) {
        if (!obj || typeof obj !== 'object') return;
        
        if (Array.isArray(obj)) {
          obj.forEach(item => deepScan(item));
          return;
        }

        let lat = null, lng = null;
        let battery = null, odometer = null, inside_temp = null, outside_temp = null;

        Object.keys(obj).forEach(k => {
          const kl = k.toLowerCase();
          if (kl === 'lat' || kl === 'latitude') lat = Number(obj[k]);
          if (kl === 'lng' || kl === 'longitude' || kl === 'lon') lng = Number(obj[k]);
          if (kl.includes('battery')) battery = parseInt(obj[k]);
          if (kl.includes('odometer') || kl === 'odo') odometer = Number(obj[k]);
          if (kl.includes('inside_temp')) inside_temp = obj[k];
          if (kl.includes('outside_temp')) outside_temp = obj[k];
        });

        if (lat && lng && !isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
          // 중복 추가 방지 처리
          const isExist = waypoints.some(wp => Math.abs(wp.lat - lat) < 0.0001 && Math.abs(wp.lng - lng) < 0.0001);
          if (!isExist) {
            waypoints.push({ lat, lng, battery, odometer, inside_temp, outside_temp });
          }
        }

        // 자식 노드가 있으면 하위 레벨로 재진입 탐색
        Object.keys(obj).forEach(k => {
          if (typeof obj[k] === 'object' && obj[k] !== null) {
            deepScan(obj[k]);
          }
        });
      }

      // 탐색 시작
      deepScan(tripData);

      // 주행 거리 혹은 수집 순으로 정렬 보정
      const hasOdo = waypoints.some(wp => wp.odometer > 0);
      if (hasOdo) {
        waypoints.sort((a, b) => (a.odometer || 0) - (b.odometer || 0));
      }
      
      waypoints.forEach((wp, i) => wp.idx = i);

      // 🔍 [진단창 작동] 데이터 상태를 검사하여 화면에 알림 표출
      const debugZone = document.getElementById('debug-zone');
      if (waypoints.length === 0) {
        debugZone.classList.remove('hidden');
        debugZone.innerHTML = `⚠️ <b>데이터 구조 진단 알림:</b> 문서를 불러왔으나 내부에서 위도/경도 필드(lat, lng)를 파싱하지 못했습니다.<br>📦 <b>현재 최상위 데이터 필드 목록:</b> <span class="font-mono bg-black/40 px-1 rounded">${Object.keys(tripData).join(', ')}</span>`;
      } else {
        debugZone.classList.add('hidden');
      }

      // HUD 데이터 보정 연산
      let moveKM = Number(tripData.moveKM || tripData.distance || 0);
      let useBattery = Number(tripData.useBattery || 0);
      
      if (moveKM === 0 && waypoints.length > 1 && hasOdo) {
        const odos = waypoints.map(wp => wp.odometer).filter(o => o > 0);
        moveKM = Math.max(...odos) - Math.min(...odos);
      }

      const validBats = waypoints.map(wp => wp.battery).filter(b => b !== null && b > 0);
      const startBat = tripData.battery_level !== undefined ? parseInt(tripData.battery_level) : (validBats.length > 0 ? validBats[0] : 0);
      const endBat = tripData.nowBattery !== undefined ? parseInt(tripData.nowBattery) : (validBats.length > 0 ? validBats[validBats.length - 1] : startBat);
      
      if (useBattery === 0 && startBat > 0 && endBat > 0) {
        useBattery = Math.abs(startBat - endBat);
      }

      let calculatedEff = 0;
      if (moveKM > 0 && useBattery > 0) {
        calculatedEff = Math.round((75000 * (useBattery / 100)) / moveKM);
      }

      document.getElementById('hud-distance').innerText = `${moveKM.toFixed(2)} km`;
      document.getElementById('hud-battery').innerText = `${startBat}% → ${endBat}%`;
      document.getElementById('hud-eff').innerText = `${useBattery.toFixed(1)}% 소모 (${calculatedEff > 0 ? calculatedEff : '-'} Wh/km)`;

      // 지도 위 드로잉 초기화
      if (routeLine) map.removeLayer(routeLine);
      if (startMarker) map.removeLayer(startMarker);
      if (endMarker) map.removeLayer(endMarker);

      const coords = waypoints.map(wp => [wp.lat, wp.lng]);

      if (coords.length > 0) {
        routeLine = L.polyline(coords, { color: '#ef4444', weight: 6, opacity: 0.9 }).addTo(map);
        
        startMarker = L.circleMarker(coords[0], { radius: 7, color: '#10b981', fillColor: '#10b981', fillOpacity: 1 }).addTo(map)
          .bindPopup(`<b>🏁 출발지점</b><br>배터리: ${startBat}%`);

        if(coords.length > 1) {
          endMarker = L.circleMarker(coords[coords.length - 1], { radius: 7, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 1 }).addTo(map)
            .bindPopup(`<b>🏁 도착지점</b><br>배터리: ${endBat}%`);
        }

        map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
      }

      // 테이블 뷰 갱신
      const logBody = document.getElementById('logTableBody');
      logBody.innerHTML = '';
      waypoints.forEach(wp => {
        const tr = document.createElement('tr');
        tr.className = "border-b border-gray-700 hover:bg-gray-700/50 text-xs text-gray-200";
        tr.innerHTML = `
          <td class="p-3 font-mono text-gray-400">Point #${wp.idx}</td>
          <td class="p-3">${wp.odometer ? wp.odometer.toFixed(2) + ' km' : '-'}</td>
          <td class="p-3"><span class="text-blue-400">${wp.outside_temp || tripData.outside_temp || '-'}°C</span> / <span class="text-orange-400">${wp.inside_temp || '-'}°C</span></td>
          <td class="p-3 text-cyan-400 font-mono">${wp.battery ? wp.battery + '%' : '-'}</td>
        `;
        logBody.appendChild(tr);
      });
    }

    function renderGlobalCharts() {
      const tripLabels = Object.keys(trips).reverse();
      const distances = [], batteryUses = [], scatterData = [];

      tripLabels.forEach(tripName => {
        const data = trips[tripName];
        distances.push(data.moveKM || data.distance || 0);
        batteryUses.push(data.useBattery || 0);
        const temp = parseFloat(data.outside_temp);
        if (!isNaN(temp) && (data.moveKM > 0 || data.distance > 0)) {
          const d = data.moveKM || data.distance;
          const eff = Math.round((75000 * ((data.useBattery || 1) / 100)) / d);
          if(eff < 500) scatterData.push({ x: temp, y: eff });
        }
      });

      if (effChart) effChart.destroy();
      effChart = new Chart(document.getElementById('efficiencyChart').getContext('2d'), {
        type: 'bar',
        data: {
          labels: tripLabels.map(l => l.replace(' 주행', '')),
          datasets: [
            { label: '주행거리 (km)', data: distances, backgroundColor: 'rgba(59, 130, 246, 0.6)', yAxisID: 'y' },
            { label: '배터리 소모 (%)', data: batteryUses, backgroundColor: 'rgba(239, 68, 68, 0.6)', yAxisID: 'y1' }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { position: 'left' }, y1: { position: 'right', grid: { drawOnChartArea: false } } } }
      });

      if (tempChart) tempChart.destroy();
      tempChart = new Chart(document.getElementById('tempScatterChart').getContext('2d'), {
        type: 'scatter',
        data: { datasets: [{ label: '외기온도별 환산전비(Wh/km)', data: scatterData, backgroundColor: 'rgba(16, 185, 129, 0.7)' }] },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('border-red-500', 'text-red-500'));
      document.getElementById('btn-' + tabId).classList.add('border-red-500', 'text-red-500');
      if (tabId === 'mapTab' && map) setTimeout(() => map.invalidateSize(), 50);
    }
  </script>
</body>
</html>
