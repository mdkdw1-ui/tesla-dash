<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Matrix Appwrite Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    #map { height: 300px; }
    pre { font-size: 11px; max-height: 250px; overflow: auto; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans p-4">

  <div id="authContainer" class="max-w-md mx-auto p-6 bg-gray-800 rounded-xl shadow-2xl border border-gray-700">
    <div id="setupView" class="hidden">
      <h2 class="text-xl font-bold text-blue-500 mb-4 text-center">🗺️ Appwrite 설정</h2>
      <div class="space-y-3">
        <input type="text" id="cfg-endpoint" value="https://sgp.cloud.appwrite.io/v1" class="w-full bg-gray-700 p-2 text-xs rounded">
        <input type="text" id="cfg-projectId" value="6a5e41d1001169a62cfd" class="w-full bg-gray-700 p-2 text-xs rounded">
        <input type="text" id="cfg-dbId" value="6a5e424100124e73ee67" class="w-full bg-gray-700 p-2 text-xs rounded">
        <input type="password" id="cfg-apiKey" placeholder="API Key (선택)" class="w-full bg-gray-700 p-2 text-xs rounded">
        <input type="text" id="cfg-kakaoKey" value="159c5d7588efc5939d431f005912f9f3" class="w-full bg-gray-700 p-2 text-xs rounded">
        <button onclick="saveConfig()" class="w-full bg-blue-600 font-bold py-2 rounded text-sm mt-2">저장 및 실행</button>
      </div>
    </div>

    <div id="loginView" class="hidden">
      <h2 class="text-xl font-bold text-center mb-4">로그인</h2>
      <input type="password" id="loginPassword" onkeydown="if(event.key === 'Enter') handleLogin()" placeholder="비밀번호" class="w-full bg-gray-700 p-2 text-center rounded mb-3">
      <button onclick="handleLogin()" class="w-full bg-blue-600 font-bold py-2 rounded">접속</button>
    </div>
  </div>

  <div id="appDashboard" class="hidden space-y-4">
    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-lg border border-gray-700">
      <h1 class="font-bold text-blue-400 text-sm">⚡ Appwrite Raw Data Inspector</h1>
      <button onclick="resetConfig()" class="bg-red-600 text-xs px-2 py-1 rounded">초기화</button>
    </div>

    <div id="syncStatus" class="text-xs text-yellow-400 bg-gray-800 p-2 rounded text-center font-mono">불러오는 중...</div>

    <!-- DB 실제 구조 출력 영역 -->
    <div class="space-y-4">
      <div class="bg-gray-800 p-3 rounded-lg border border-gray-700">
        <h3 class="text-xs font-bold text-green-400 mb-1">1. [driving] 최신 문서 1개 샘플</h3>
        <pre id="raw-driving" class="bg-gray-950 p-2 rounded text-gray-300">데이터 없음</pre>
      </div>

      <div class="bg-gray-800 p-3 rounded-lg border border-gray-700">
        <h3 class="text-xs font-bold text-yellow-400 mb-1">2. [vehicle_state] 최신 문서 1개 샘플</h3>
        <pre id="raw-vehicle" class="bg-gray-950 p-2 rounded text-gray-300">데이터 없음</pre>
      </div>
    </div>
  </div>

  <script>
    const KEY = "secure_tesla_appwrite_tokens";
    let cfg = null;

    window.onload = function() {
      if (!localStorage.getItem(KEY)) document.getElementById('setupView').classList.remove('hidden');
      else document.getElementById('loginView').classList.remove('hidden');
    };

    function saveConfig() {
      let ep = document.getElementById('cfg-endpoint').value.trim();
      if (ep.endsWith('/')) ep = ep.slice(0, -1);
      const data = {
        endpoint: ep,
        projectId: document.getElementById('cfg-projectId').value.trim(),
        dbId: document.getElementById('cfg-dbId').value.trim(),
        apiKey: document.getElementById('cfg-apiKey').value.trim(),
        kakaoKey: document.getElementById('cfg-kakaoKey').value.trim()
      };
      localStorage.setItem(KEY, CryptoJS.AES.encrypt(JSON.stringify(data), "emillie00").toString());
      init(data);
    }

    function handleLogin() {
      try {
        const bytes = CryptoJS.AES.decrypt(localStorage.getItem(KEY), document.getElementById('loginPassword').value.trim());
        cfg = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
        init(cfg);
      } catch (e) { alert("비밀번호 오류"); }
    }

    async function init(config) {
      cfg = config;
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('appDashboard').classList.remove('hidden');
      await inspectData();
    }

    async function inspectData() {
      const base = `${cfg.endpoint}/databases/${cfg.dbId}`;
      const headers = { 'X-Appwrite-Project': cfg.projectId };
      if (cfg.apiKey) headers['X-Appwrite-Key'] = cfg.apiKey;

      const status = document.getElementById('syncStatus');

      // 1. driving 샘플 추출
      try {
        const res = await fetch(`${base}/collections/driving/documents`, { headers });
        if (res.ok) {
          const json = await res.json();
          if (json.documents && json.documents.length > 0) {
            document.getElementById('raw-driving').innerText = JSON.stringify(json.documents[0], null, 2);
          }
        }
      } catch(e) { document.getElementById('raw-driving').innerText = e.message; }

      // 2. vehicle_state 샘플 추출
      try {
        const res = await fetch(`${base}/collections/6a5e4796003794d2ffff/documents`, { headers });
        if (res.ok) {
          const json = await res.json();
          if (json.documents && json.documents.length > 0) {
            document.getElementById('raw-vehicle').innerText = JSON.stringify(json.documents[0], null, 2);
          }
        }
      } catch(e) { document.getElementById('raw-vehicle').innerText = e.message; }

      status.innerText = "✅ 데이터 구조 조회 완료! 화면의 텍스트 스크린샷을 찍어주세요.";
    }

    function resetConfig() { localStorage.removeItem(KEY); location.reload(); }
  </script>
</body>
</html>
